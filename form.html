<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form>
      <label for="txtFirstName">FirstName</label><br />

      <input type="text" name="firstName" id="txtFirstName" placeholder="example:Ah cherm" required /><br />

      <label for="txtlastName">LastName</label><br />

      <input type="text" name="lastName" id="txtlastName" placeholder="example:Bro" required /><br />

      <label for="txtemail">Email</label><br />

      <input type="email" name="userEmail" id="txtemail" placeholder="e.g Ahcherm@gmail.kh" required /> <br />

      <label for="txtPassword">Password</label><br />

      <input type="password" name="userPassword" id="txtPassword" placeholder="at least 8 letter" minlength="8" maxlength="12" required /><br /><br>
       
      <button type="submit">Register</button>
      <button type="reset">Clear data</button>
    </form>
  </body>
</html>
